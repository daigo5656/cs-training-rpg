<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 - CS新人育成RPG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    body { font-family: 'Inter', sans-serif; }
    @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fade-in 0.4s ease-out forwards; }
    .modal-backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-amber-50/30 text-slate-800">

  <!-- ローディング -->
  <div id="loading-screen" class="fixed inset-0 bg-gradient-to-br from-slate-50 to-amber-50 z-[100] flex items-center justify-center">
    <div class="text-center">
      <div class="w-20 h-20 bg-gradient-to-tr from-amber-400 to-orange-500 rounded-3xl flex items-center justify-center text-white shadow-2xl mx-auto mb-6 animate-pulse">
        <i data-lucide="shield" width="28"></i>
      </div>
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 bg-amber-400 rounded-full animate-bounce" style="animation-delay:0s"></div>
        <div class="w-2 h-2 bg-orange-400 rounded-full animate-bounce" style="animation-delay:0.15s"></div>
        <div class="w-2 h-2 bg-red-400 rounded-full animate-bounce" style="animation-delay:0.3s"></div>
      </div>
    </div>
  </div>

  <!-- ヘッダー -->
  <header class="bg-white/80 backdrop-blur-xl border-b border-slate-200/50 sticky top-0 z-40 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-12 h-12 bg-gradient-to-tr from-amber-400 to-orange-500 rounded-2xl flex items-center justify-center text-white shadow-lg">
          <i data-lucide="shield" width="22"></i>
        </div>
        <div>
          <h1 class="text-lg font-black text-slate-800">管理画面</h1>
          <p class="text-xs text-slate-400">カスタマーサクセス部 — ユーザー管理・ロール設定・マネージャー割り当て</p>
        </div>
      </div>
      <div class="flex gap-2">
        <a href="./app.html" class="px-4 py-2.5 bg-gradient-to-r from-teal-50 to-emerald-50 text-teal-700 rounded-xl text-sm font-bold hover:shadow-md transition-all flex items-center gap-1.5 border border-teal-200/50">
          <i data-lucide="arrow-left" width="14"></i> アプリ
        </a>
        <button onclick="handleLogout()" class="px-3 py-2.5 bg-slate-100 text-slate-400 rounded-xl text-sm font-bold hover:bg-slate-200 transition-all">
          <i data-lucide="log-out" width="14"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div id="admin-stats" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>

    <!-- ユーザー一覧 -->
    <div class="bg-white rounded-3xl border border-slate-200/50 shadow-sm overflow-hidden">
      <div class="p-6 border-b border-slate-100 flex items-center justify-between">
        <h2 class="text-lg font-black text-slate-800 flex items-center gap-2">
          <i data-lucide="users" width="20" class="text-teal-500"></i> ユーザー一覧
        </h2>
        <div class="text-sm text-slate-400" id="user-count-label"></div>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-slate-100 bg-slate-50/80">
              <th class="text-left px-6 py-3 font-bold text-slate-400 text-[10px] uppercase tracking-wider">ユーザー</th>
              <th class="text-center px-6 py-3 font-bold text-slate-400 text-[10px] uppercase tracking-wider">達成</th>
              <th class="text-center px-6 py-3 font-bold text-slate-400 text-[10px] uppercase tracking-wider">進捗</th>
              <th class="text-center px-6 py-3 font-bold text-slate-400 text-[10px] uppercase tracking-wider">ロール</th>
              <th class="text-center px-6 py-3 font-bold text-slate-400 text-[10px] uppercase tracking-wider">マネージャー</th>
              <th class="text-center px-6 py-3 font-bold text-slate-400 text-[10px] uppercase tracking-wider">操作</th>
            </tr>
          </thead>
          <tbody id="user-table-body" class="divide-y divide-slate-100"></tbody>
        </table>
      </div>
    </div>

    <!-- ユーザー編集モーダル -->
    <div id="user-edit-modal" class="fixed inset-0 z-[60] hidden items-center justify-center p-4 modal-backdrop">
      <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden animate-fade-in">
        <div class="p-6 border-b border-slate-100 bg-gradient-to-br from-amber-50 to-orange-50">
          <h3 class="font-bold text-lg text-slate-800 flex items-center gap-2">
            <div class="w-8 h-8 bg-gradient-to-tr from-amber-400 to-orange-500 rounded-lg flex items-center justify-center">
              <i data-lucide="user-cog" width="16" class="text-white"></i>
            </div>
            ユーザー情報編集
          </h3>
          <p id="edit-user-label" class="text-sm text-slate-500 mt-1 ml-10"></p>
        </div>
        <div class="p-6 space-y-4">
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1.5">表示名</label>
            <input id="edit-display-name" type="text" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-300 transition-all">
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1.5">部署</label>
            <input id="edit-department" type="text" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-300 transition-all">
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1.5">ロール</label>
            <select id="edit-role" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-300 transition-all">
              <option value="user">User</option>
              <option value="manager">Manager</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1.5">マネージャー</label>
            <select id="edit-manager" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-300 transition-all">
              <option value="">未設定</option>
            </select>
          </div>
        </div>
        <div class="p-4 border-t border-slate-100 bg-slate-50/50 flex gap-3">
          <button onclick="closeEditModal()" class="flex-1 py-3 rounded-xl font-bold text-slate-500 bg-white border border-slate-200 hover:bg-slate-50 transition-all">
            キャンセル
          </button>
          <button onclick="saveUserEdit()" class="flex-1 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-amber-400 to-orange-500 shadow-lg hover:brightness-110 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2">
            <i data-lucide="save" width="16"></i> 保存
          </button>
        </div>
      </div>
    </div>

    <!-- ユーザー詳細モーダル -->
    <div id="user-detail-modal" class="fixed inset-0 z-[60] hidden items-center justify-center p-4 modal-backdrop">
      <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl max-h-[80vh] overflow-y-auto animate-fade-in">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between sticky top-0 bg-white z-10 rounded-t-3xl">
          <h3 id="detail-user-name" class="font-bold text-lg text-slate-800"></h3>
          <button onclick="closeDetail()" class="p-2 hover:bg-slate-100 rounded-xl transition-all"><i data-lucide="x" width="20"></i></button>
        </div>
        <div id="detail-content" class="p-6"></div>
      </div>
    </div>
  </main>

  <script src="./js/supabase-client.js"></script>
  <script src="./js/skill-data.js"></script>
  <script src="./js/admin.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
