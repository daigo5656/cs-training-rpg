<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS新人育成RPG - カスタマーサクセス部</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    body { font-family: 'Inter', sans-serif; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(3deg); }
      50% { transform: translateY(-12px) rotate(-1deg); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 20px rgba(20,184,166,0.3), 0 0 60px rgba(20,184,166,0.1); }
      50% { box-shadow: 0 0 30px rgba(20,184,166,0.5), 0 0 80px rgba(20,184,166,0.2); }
    }
    @keyframes particle-1 { 0%,100%{transform:translate(0,0) scale(1);opacity:0.3;} 50%{transform:translate(40px,-60px) scale(1.5);opacity:0.7;} }
    @keyframes particle-2 { 0%,100%{transform:translate(0,0) scale(1);opacity:0.2;} 50%{transform:translate(-50px,-40px) scale(1.3);opacity:0.6;} }
    @keyframes particle-3 { 0%,100%{transform:translate(0,0) scale(1);opacity:0.4;} 50%{transform:translate(30px,50px) scale(1.2);opacity:0.5;} }

    .animate-float { animation: float 4s ease-in-out infinite; }
    .animate-glow { animation: glow 3s ease-in-out infinite; }
    .animate-fade-up { animation: fade-up 0.6s ease-out forwards; }
    .animate-fade-up-delay { animation: fade-up 0.6s ease-out 0.15s forwards; opacity: 0; }
    .animate-fade-up-delay2 { animation: fade-up 0.6s ease-out 0.3s forwards; opacity: 0; }
    .shimmer-text {
      background: linear-gradient(90deg, #14b8a6, #10b981, #06b6d4, #10b981, #14b8a6);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
    }

    .input-focus:focus { box-shadow: 0 0 0 3px rgba(20,184,166,0.15), 0 1px 2px rgba(0,0,0,0.05); }
    .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-teal-950 to-emerald-950 flex items-center justify-center p-4 overflow-hidden relative">

  <!-- パーティクル背景 -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute w-64 h-64 bg-teal-500/10 rounded-full blur-3xl top-1/4 -left-20" style="animation: particle-1 8s ease-in-out infinite;"></div>
    <div class="absolute w-96 h-96 bg-emerald-500/10 rounded-full blur-3xl top-1/3 -right-32" style="animation: particle-2 10s ease-in-out infinite;"></div>
    <div class="absolute w-48 h-48 bg-cyan-500/10 rounded-full blur-3xl bottom-1/4 left-1/3" style="animation: particle-3 7s ease-in-out infinite;"></div>
  </div>

  <div class="w-full max-w-md relative z-10">
    <!-- ロゴ -->
    <div class="text-center mb-8 animate-fade-up">
      <div class="inline-flex items-center justify-center w-24 h-24 bg-gradient-to-tr from-teal-500 via-emerald-500 to-cyan-500 rounded-3xl shadow-2xl animate-float animate-glow mb-6">
        <span class="font-black text-4xl text-white drop-shadow-lg">CS</span>
      </div>
      <h1 class="text-3xl font-black shimmer-text mb-2">CS Training RPG</h1>
      <p class="text-sm text-teal-300/70 font-medium tracking-wide">CUSTOMER SUCCESS DIVISION</p>
    </div>

    <!-- カード -->
    <div class="glass rounded-3xl shadow-2xl border border-white/20 overflow-hidden animate-fade-up-delay">
      <!-- タブ -->
      <div class="flex border-b border-slate-200/30">
        <button id="tab-login" onclick="switchTab('login')"
          class="flex-1 py-4 text-sm font-bold text-center transition-all border-b-2 border-teal-500 text-teal-600">
          ログイン
        </button>
        <button id="tab-signup" onclick="switchTab('signup')"
          class="flex-1 py-4 text-sm font-bold text-center transition-all border-b-2 border-transparent text-slate-400 hover:text-slate-600">
          新規登録
        </button>
      </div>

      <div class="p-7">
        <div id="error-msg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600 flex items-center gap-2">
          <i data-lucide="alert-circle" width="16"></i><span id="error-text"></span>
        </div>
        <div id="success-msg" class="hidden mb-4 p-3 bg-emerald-50 border border-emerald-200 rounded-xl text-sm text-emerald-600 flex items-center gap-2">
          <i data-lucide="check-circle" width="16"></i><span id="success-text"></span>
        </div>

        <form id="auth-form" onsubmit="handleSubmit(event)" class="space-y-5">
          <div id="name-field" class="hidden">
            <label class="block text-sm font-bold text-slate-700 mb-1.5">表示名</label>
            <input id="display-name" type="text" placeholder="山田 太郎"
              class="input-focus w-full px-4 py-3.5 border border-slate-200 rounded-xl focus:outline-none focus:border-teal-400 transition-all bg-white/70">
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1.5">メールアドレス</label>
            <input id="email" type="email" required placeholder="you@example.com"
              class="input-focus w-full px-4 py-3.5 border border-slate-200 rounded-xl focus:outline-none focus:border-teal-400 transition-all bg-white/70">
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-1.5">パスワード</label>
            <input id="password" type="password" required placeholder="6文字以上" minlength="6"
              class="input-focus w-full px-4 py-3.5 border border-slate-200 rounded-xl focus:outline-none focus:border-teal-400 transition-all bg-white/70">
          </div>
          <button type="submit" id="submit-btn"
            class="w-full py-4 bg-gradient-to-r from-teal-500 via-emerald-500 to-cyan-500 text-white font-bold rounded-xl shadow-lg hover:shadow-xl hover:brightness-110 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2 text-base">
            <i data-lucide="log-in" width="18"></i>
            <span id="submit-text">ログイン</span>
          </button>
        </form>
      </div>
    </div>

    <p class="text-center text-xs text-teal-400/40 mt-8 animate-fade-up-delay2">
      &copy; Customer Success Division &mdash; Training System v1.0
    </p>
  </div>

  <script src="./js/supabase-client.js"></script>
  <script src="./js/auth.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
